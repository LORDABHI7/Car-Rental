<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DriveX | Admin Dashboard</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .admin-layout {
            display: grid;
            grid-template-columns: 250px 1fr;
            min-height: 100vh;
        }
        .sidebar {
            background: var(--secondary);
            color: white;
            padding: 2rem 0;
            position: fixed;
            height: 100vh;
            width: 250px;
        }
        .sidebar a {
            padding: 1rem 2rem;
            display: block;
            color: var(--text-muted);
            font-weight: 500;
        }
        .sidebar a:hover, .sidebar a.active {
            color: white;
            background: rgba(255,255,255,0.1);
            border-left: 4px solid var(--primary);
        }
        .main-content {
            margin-left: 250px;
            padding: 3rem;
            background: var(--bg-body);
        }
        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            border-radius: var(--radius-md);
            overflow: hidden;
            box-shadow: var(--shadow-sm);
        }
        th, td {
            padding: 1rem;
            text-align: left;
            border-bottom: 1px solid var(--border);
        }
        th {
            background: var(--bg-light);
            font-weight: 600;
            color: var(--secondary);
        }
        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.5);
            align-items: center; justify-content: center;
            z-index: 2000;
        }
        .modal.active { display: flex; }
        .modal-content {
            background: white; padding: 2rem; border-radius: var(--radius-lg);
            width: 100%; max-width: 500px;
        }
    </style>
</head>
<body>

    <div class="admin-layout">
        <div class="sidebar">
            <div style="padding: 0 2rem 2rem;">
                <a href="index.html" class="logo text-white" style="padding:0;">
                    <i class="fa-solid fa-car-side"></i> Drive<span>X</span>
                </a>
            </div>
            <a href="#" class="active" onclick="showTab('cars-tab', this)"><i class="fa-solid fa-car"></i> Manage Cars</a>
            <a href="#" onclick="showTab('bookings-tab', this)"><i class="fa-solid fa-calendar-check"></i> Bookings</a>
            <a href="#" onclick="logout(event)"><i class="fa-solid fa-arrow-right-from-bracket"></i> Logout</a>
        </div>

        <div class="main-content">
            
            <!-- Cars Tab -->
            <div id="cars-tab">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
                    <h2>Manage Fleet</h2>
                    <button class="btn btn-primary" onclick="openCarModal()">+ Add New Car</button>
                </div>
                
                <div style="overflow-x: auto;">
                    <table>
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Vehicle</th>
                                <th>Rate/Day</th>
                                <th>Status</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="admin-cars-tbody">
                            <!-- Injected via JS -->
                        </tbody>
                    </table>
                </div>
            </div>

            <!-- Bookings Tab -->
            <div id="bookings-tab" style="display: none;">
                <h2 style="margin-bottom: 2rem;">Recent Bookings</h2>
                <div style="overflow-x: auto;">
                    <table>
                        <thead>
                            <tr>
                                <th>Booking ID</th>
                                <th>Customer</th>
                                <th>Vehicle</th>
                                <th>Dates</th>
                                <th>Total</th>
                            </tr>
                        </thead>
                        <tbody id="admin-bookings-tbody">
                            <!-- Injected via JS -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <!-- Add/Edit Car Modal -->
    <div class="modal" id="car-modal">
        <div class="modal-content">
            <h2 id="modal-title" style="margin-bottom: 1.5rem;">Add Car</h2>
            <form id="car-form">
                <input type="hidden" id="car_id">
                <div class="form-group">
                    <label>Car Name</label>
                    <input type="text" id="car_name" class="form-control" required>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Price Per Day (₹)</label>
                        <input type="number" id="price_per_day" class="form-control" required step="0.01">
                    </div>
                    <div class="form-group">
                        <label>Seats</label>
                        <input type="number" id="seats" class="form-control" required>
                    </div>
                </div>
                <div class="form-group">
                    <label>Fuel Type</label>
                    <select id="fuel_type" class="form-control" required>
                        <option value="Petrol">Petrol</option>
                        <option value="Diesel">Diesel</option>
                        <option value="Electric">Electric</option>
                        <option value="Hybrid">Hybrid</option>
                    </select>
                </div>
                </div>
                <div class="form-group">
                    <label>Car Image (Upload File)</label>
                    <input type="file" id="image" class="form-control" accept="image/*">
                    <small style="color: var(--text-muted);">Leave empty to keep existing image when editing</small>
                </div>
                
                <div style="display: flex; gap: 1rem; margin-top: 2rem;">
                    <button type="button" class="btn btn-outline btn-block" onclick="closeCarModal()">Cancel</button>
                    <button type="submit" class="btn btn-primary btn-block">Save Vehicle</button>
                </div>
            </form>
        </div>
    </div>

    <script src="js/script.js"></script>
    <script>
        // Tab routing
        function showTab(tabId, el) {
            document.getElementById('cars-tab').style.display = 'none';
            document.getElementById('bookings-tab').style.display = 'none';
            
            document.querySelectorAll('.sidebar a').forEach(a => a.classList.remove('active'));
            el.classList.add('active');

            document.getElementById(tabId).style.display = 'block';

            if(tabId === 'cars-tab') loadAdminCars();
            if(tabId === 'bookings-tab') loadAdminBookings();
        }

        // Init
        document.addEventListener('DOMContentLoaded', () => {
            const user = checkAuth();
            if (!user || user.role !== 'admin') {
                alert('Unauthorized. Admin access required.');
                window.location.href = 'index.html';
                return;
            }
            loadAdminCars();
        });

        let adminCarsData = [];

        // Load Cars
        async function loadAdminCars() {
            try {
                const res = await fetch(`${API_URL}/cars`);
                if (!res.ok) throw new Error("HTTP error " + res.status);
                const cars = await res.json();
                adminCarsData = cars;
                
                const tbody = document.getElementById('admin-cars-tbody');
                tbody.innerHTML = cars.map(car => `
                    <tr>
                        <td>#${car.id}</td>
                        <td style="font-weight: 500;">${car.car_name}</td>
                        <td>₹${car.price_per_day}</td>
                        <td>
                            <span style="padding: 0.25rem 0.5rem; border-radius: 4px; font-size: 0.85rem; background: ${car.availability ? 'var(--success)' : 'var(--error)'}; color: white;">
                                ${car.availability ? 'Available' : 'Rented'}
                            </span>
                        </td>
                        <td>
                            <button class="btn btn-outline" style="padding: 0.3rem 0.6rem; font-size: 0.8rem;" onclick="openCarModalById(${car.id})">Edit</button>
                            <button class="btn btn-primary" style="padding: 0.3rem 0.6rem; font-size: 0.8rem; background: var(--error); border-color: var(--error);" onclick="deleteCar(${car.id})">Del</button>
                        </td>
                    </tr>
                `).join('');
            } catch(e) { 
                console.error(e); 
                alert("Error loading cars: " + e.message);
            }
        }

        function openCarModalById(id) {
            const car = adminCarsData.find(c => c.id === id);
            openCarModal(car);
        }

        // Load Bookings
        async function loadAdminBookings() {
            try {
                const res = await fetch(`${API_URL}/bookings`);
                const bookings = await res.json();
                
                const tbody = document.getElementById('admin-bookings-tbody');
                tbody.innerHTML = bookings.map(b => `
                    <tr>
                        <td>#BKN-${b.id}</td>
                        <td>${b.user_name}<br><small style="color:var(--text-muted)">${b.email}</small></td>
                        <td style="font-weight: 500;">${b.car_name}</td>
                        <td>${new Date(b.pickup_date).toLocaleDateString()} - ${new Date(b.return_date).toLocaleDateString()}</td>
                        <td style="font-weight: 700; color: var(--primary)">₹${b.total_price}</td>
                    </tr>
                `).join('');
            } catch(e) { console.error(e); }
        }

        // Modal Logic
        const modal = document.getElementById('car-modal');
        function openCarModal(car = null) {
            modal.classList.add('active');
            if (car) {
                document.getElementById('modal-title').textContent = 'Edit Car';
                document.getElementById('car_id').value = car.id;
                document.getElementById('car_name').value = car.car_name;
                document.getElementById('price_per_day').value = car.price_per_day;
                document.getElementById('seats').value = car.seats;
                document.getElementById('fuel_type').value = car.fuel_type;
                document.getElementById('image').value = '';
            } else {
                document.getElementById('modal-title').textContent = 'Add New Car';
                document.getElementById('car-form').reset();
                document.getElementById('car_id').value = '';
                document.getElementById('image').value = '';
            }
        }
        function closeCarModal() {
            modal.classList.remove('active');
        }

        // Save Car
        document.getElementById('car-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const id = document.getElementById('car_id').value;
            
            const formData = new FormData();
            formData.append('car_name', document.getElementById('car_name').value);
            formData.append('price_per_day', document.getElementById('price_per_day').value);
            formData.append('seats', document.getElementById('seats').value);
            formData.append('fuel_type', document.getElementById('fuel_type').value);
            formData.append('availability', 'true');
            
            const imageFile = document.getElementById('image').files[0];
            if (imageFile) {
                formData.append('image', imageFile);
            }

            const method = id ? 'PUT' : 'POST';
            const url = id ? `${API_URL}/cars/${id}` : `${API_URL}/cars`;

            try {
                const res = await fetch(url, {
                    method: method,
                    body: formData
                });
                if(res.ok) {
                    closeCarModal();
                    loadAdminCars();
                } else { alert('Error saving car'); }
            } catch(e) { console.error(e); }
        });

        // Delete Car
        async function deleteCar(id) {
            if(!confirm('Are you sure you want to delete this vehicle?')) return;
            try {
                const res = await fetch(`${API_URL}/cars/${id}`, { method: 'DELETE' });
                if(res.ok) loadAdminCars();
            } catch(e) { console.error(e); }
        }
    </script>
</body>
</html>
