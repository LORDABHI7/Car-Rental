<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DriveX | Car Details</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .details-grid {
            display: grid;
            grid-template-columns: 3fr 2fr;
            gap: 3rem;
        }
        .main-image {
            width: 100%;
            height: 500px;
            object-fit: cover;
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-lg);
        }
        .details-card {
            background: var(--bg-card);
            padding: 2.5rem;
            border-radius: var(--radius-lg);
            border: 1px solid var(--border);
            box-shadow: var(--shadow-md);
        }
        .details-specs {
            margin: 2rem 0;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
        }
        .spec-box {
            background: var(--bg-light);
            padding: 1rem;
            border-radius: var(--radius-md);
            display: flex;
            align-items: center;
            gap: 1rem;
        }
        .spec-box i {
            font-size: 1.5rem;
            color: var(--primary);
        }
        .price-huge {
            font-size: 3rem;
            font-weight: 800;
            color: var(--primary);
            margin-bottom: 1rem;
        }
        .price-huge span {
            font-size: 1rem;
            color: var(--text-muted);
            font-weight: 500;
        }
        @media (max-width: 992px) {
            .details-grid { grid-template-columns: 1fr; }
            .main-image { height: 400px; }
        }
    </style>
</head>
<body>

    <!-- Navigation Bar -->
    <nav class="navbar" id="navbar">
        <div class="container nav-container">
            <a href="index.html" class="logo">
                <i class="fa-solid fa-car-side"></i> Drive<span>X</span>
            </a>
            <ul class="nav-links" id="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="cars.html" class="active">Cars</a></li>
                <div id="auth-links" class="auth-group">
                    <li><a href="login.html" class="btn btn-outline">Log In</a></li>
                </div>
            </ul>
        </div>
    </nav>

    <!-- Details Section -->
    <section class="section" style="padding-top: 8rem; min-height: 80vh;">
        <div class="container">
            <div id="details-content">
                <!-- Loader -->
                <div style="text-align: center; font-size: 2rem; color: var(--primary); padding: 5rem 0;">
                    <i class="fa-solid fa-spinner fa-spin"></i> Loading Details...
                </div>
            </div>
        </div>
    </section>

    <!-- Scripts -->
    <script src="js/script.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const urlParams = new URLSearchParams(window.location.search);
            const carId = urlParams.get('id');
            const container = document.getElementById('details-content');

            if (!carId) {
                container.innerHTML = `<div class="alert error">Car ID not provided.</div>`;
                return;
            }

            try {
                const response = await fetch(`${API_URL}/cars/${carId}`);
                if (!response.ok) throw new Error('Car not found');
                
                const car = await response.json();

                container.innerHTML = `
                    <div class="mb-4">
                        <a href="cars.html" class="btn btn-outline"><i class="fa-solid fa-arrow-left"></i> Back to Fleet</a>
                    </div>
                    <div class="details-grid">
                        <div>
                            <img src="${car.image}" alt="${car.car_name}" class="main-image">
                            <h3 class="mt-4" style="font-size: 1.5rem; margin-bottom: 1rem;">Vehicle Description</h3>
                            <p style="color: var(--text-muted); line-height: 1.8;">
                                Experience the thrill and comfort of the ${car.car_name}. This premium vehicle comes fully equipped with modern amenities and top-tier safety features, ensuring your journey is as smooth as possible. Perfectly maintained and ready for your next adventure.
                            </p>
                        </div>
                        
                        <div>
                            <div class="details-card">
                                <h1 style="font-size: 2.5rem; margin-bottom: 0.5rem;">${car.car_name}</h1>
                                
                                <div class="${car.availability ? 'text-success' : 'text-error'}" style="font-weight: 600; font-size: 1.1rem; margin-bottom: 1rem;">
                                    <i class="fa-solid ${car.availability ? 'fa-circle-check' : 'fa-circle-xmark'}"></i> 
                                    ${car.availability ? 'Available for Rent' : 'Currently Booked'}
                                </div>

                                <div class="price-huge">
                                    ₹${car.price_per_day}<span>/day</span>
                                </div>

                                <div class="details-specs">
                                    <div class="spec-box">
                                        <i class="fa-solid fa-gas-pump"></i>
                                        <div>
                                            <div style="font-size: 0.8rem; color: var(--text-muted)">Fuel Type</div>
                                            <div style="font-weight: 600;">${car.fuel_type}</div>
                                        </div>
                                    </div>
                                    <div class="spec-box">
                                        <i class="fa-solid fa-users"></i>
                                        <div>
                                            <div style="font-size: 0.8rem; color: var(--text-muted)">Capacity</div>
                                            <div style="font-weight: 600;">${car.seats} Seats</div>
                                        </div>
                                    </div>
                                    <div class="spec-box">
                                        <i class="fa-solid fa-gear"></i>
                                        <div>
                                            <div style="font-size: 0.8rem; color: var(--text-muted)">Transmission</div>
                                            <div style="font-weight: 600;">Automatic</div>
                                        </div>
                                    </div>
                                    <div class="spec-box">
                                        <i class="fa-solid fa-snowflake"></i>
                                        <div>
                                            <div style="font-size: 0.8rem; color: var(--text-muted)">Climate Control</div>
                                            <div style="font-weight: 600;">Included</div>
                                        </div>
                                    </div>
                                </div>

                                ${car.availability 
                                    ? `<a href="booking.html?car_id=${car.id}" class="btn btn-primary btn-block btn-lg" style="margin-top: 1rem;">Proceed to Booking</a>` 
                                    : `<button class="btn btn-block btn-lg" style="background: var(--text-muted); color: white; cursor: not-allowed; margin-top: 1rem;" disabled>Currently Unavailable</button>`
                                }
                            </div>
                        </div>
                    </div>
                `;
            } catch (error) {
                container.innerHTML = `<div class="alert error" style="display:block;">${error.message}</div>`;
            }
        });
    </script>
</body>
</html>
